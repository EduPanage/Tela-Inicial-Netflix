<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" as="font" crossorigin="anonymous"
        href="https://occ.a.nflxso.net/genc/hawkins/5.15.3/font/netflix-sans-core-variable-full.woff2"
        type="font/woff2">
    <link rel="icon" type="image/x-icon" href="assets/FaviconNetflix.png">
    <link rel="stylesheet" href="styles/style.css">
    <title>Netflix</title>
</head>

<body>
    <main>
        <div class="conteiner-inicial">

                <h1 class="tela-inicial-titulo">Quem está assistindo?</h1>
                <ul class="tela-inicial-perfis">
                    <li class="perfil">
                        <a class="perfil-link" href="pages/catalogo.html">
                            <div class="perfil-conteiner">
                                <img class="perfil-conteiner-image" src="assets/Perfil 1.png" alt="Jon Snow Image">
                                <p class="perfil-conteiner-nome">Jnow</p>
                            </div>
                        </a>
                    </li>
                    <li class="perfil">
                        <a class="perfil-link" href="pages/catalogo.html">
                            <div class="perfil-conteiner" >
                                <img class="perfil-conteiner-image" src="assets/Perfil 2.png"
                                    alt="Denerys Targaryen Image">

                    </li>
                    <li class="perfil">

                    </li>
                    <li class="perfil">

                            </div>
                        </a>
                    </li>
                    <li class="perfil">
                        <a class="perfil-link">
                            <div class="perfil-conteiner">
                                <img class="perfil-conteiner-image-add" src="assets/IconAdicionar.png" alt="Add Image">
                                <p class="perfil-conteiner-nome">Adicionar perfil</p>
                            </div>

                </ul>
                <a class="gerenciar-perfis" href="">
                    <p class="gerenciar-perfis-texto">Gerenciar perfis</p>
